<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="alert-wrap">
        <section class="alert-card {{ kind }}">
            <span class="eyebrow">{{ 'Berhasil' if kind == 'success' else 'Perhatian' }}</span>
            <h1>{{ title }}</h1>
            <p>{{ message }}</p>
            <a class="btn btn-primary" href="{{ back_url }}">{{ back_label }}</a>
        </section>
    </main>
</body>
</html>
