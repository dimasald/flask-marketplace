<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="hero-card form-card">
            <div class="hero-top">
                <span class="eyebrow">Keamanan akun</span>
                <h1 class="hero-title">Ganti password</h1>
                <p class="hero-copy">Masukkan password baru yang kuat dan mudah kamu ingat.</p>
            </div>

            <form class="form-grid" action="/change-password" method="post">
                <div class="field">
                    <label for="password">Password baru</label>
                    <input id="password" type="password" name="password" placeholder="Enter the new password">
                </div>
                <button class="btn btn-primary" type="submit">Change</button>
            </form>

            <div class="toolbar">
                <a class="btn btn-ghost" href="/dashboard">Kembali ke Dashboard</a>
            </div>
        </section>
    </main>
</body>
</html>
